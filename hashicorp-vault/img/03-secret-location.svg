<svg width="720" height="360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="360" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="360" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">Wo landet das Secret?</text>

  <!-- ===== LEFT: Standard Kubernetes Secret (NOT used) ===== -->
  <rect x="22" y="58" width="300" height="260" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5" rx="8"/>
  <rect x="22" y="58" width="300" height="32" fill="#9CA3AF" rx="8"/>
  <rect x="22" y="78" width="300" height="12" fill="#9CA3AF"/>
  <text x="172" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Kubernetes Secret (NICHT hier)</text>

  <!-- etcd icon-ish -->
  <rect x="42" y="108" width="260" height="60" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" rx="6"/>
  <text x="172" y="130" text-anchor="middle" font-size="11" fill="#991B1B" font-weight="bold">etcd</text>
  <text x="172" y="150" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#B91C1C">type: Opaque</text>
  <text x="172" y="164" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#B91C1C">data: cGFzc3dvcmQ=  (base64)</text>

  <text x="172" y="202" text-anchor="middle" font-size="10" fill="#6B7280">sichtbar mit:</text>
  <rect x="52" y="210" width="240" height="28" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1" rx="4"/>
  <text x="172" y="229" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#374151">kubectl get secret ...</text>

  <text x="172" y="264" text-anchor="middle" font-size="10" fill="#6B7280">in etcd gespeichert (persistiert)</text>
  <text x="172" y="282" text-anchor="middle" font-size="10" fill="#6B7280">Base64 — kein echter Schutz</text>

  <!-- Cross over left box -->
  <line x1="32" y1="68" x2="312" y2="308" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="312" y1="68" x2="32" y2="308" stroke="#EF4444" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- VS label -->
  <circle cx="360" cy="188" r="22" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
  <text x="360" y="193" text-anchor="middle" font-size="14" font-weight="bold" fill="#475569">VS</text>

  <!-- ===== RIGHT: Vault Injection (the correct way) ===== -->
  <rect x="398" y="58" width="300" height="260" fill="#F0FDF4" stroke="#16A34A" stroke-width="2" rx="8"/>
  <rect x="398" y="58" width="300" height="32" fill="#16A34A" rx="8"/>
  <rect x="398" y="78" width="300" height="12" fill="#16A34A"/>
  <text x="548" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Vault Agent Injection ✓</text>

  <!-- Pod box inside -->
  <rect x="418" y="102" width="260" height="186" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5" rx="6"/>
  <rect x="418" y="102" width="260" height="24" fill="#F97316" rx="6"/>
  <rect x="418" y="114" width="260" height="12" fill="#F97316"/>
  <text x="548" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pod (tmpfs / Arbeitsspeicher)</text>

  <!-- Filesystem tree -->
  <text x="438" y="144" font-family="Courier New, monospace" font-size="12" fill="#374151">/vault/</text>
  <text x="452" y="162" font-family="Courier New, monospace" font-size="12" fill="#374151">└── secrets/</text>

  <!-- config file highlight -->
  <rect x="462" y="170" width="200" height="56" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5" rx="4"/>
  <text x="472" y="187" font-family="Courier New, monospace" font-size="12" fill="#14532D">    └── config</text>
  <text x="482" y="207" font-family="Courier New, monospace" font-size="10" fill="#166534">username=dbuser</text>
  <text x="482" y="221" font-family="Courier New, monospace" font-size="10" fill="#166534">password=secret123</text>

  <!-- Properties below -->
  <text x="548" y="264" text-anchor="middle" font-size="10" fill="#14532D">nur im RAM — verschwindet mit dem Pod</text>
  <text x="548" y="280" text-anchor="middle" font-size="10" fill="#14532D">nicht in etcd — nicht in kubectl get secrets</text>

  <!-- Footer -->
  <text x="360" y="340" text-anchor="middle" font-size="11" fill="#64748B" font-style="italic">Das Secret existiert nur im Arbeitsspeicher des Pods — kein Kubernetes Secret Objekt wird erstellt</text>
</svg>
