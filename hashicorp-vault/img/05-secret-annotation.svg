<svg width="860" height="500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="500" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="430" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E293B">agent-inject-secret — Name und Wert erklärt</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- SECTION 1: Anatomy of the annotation             -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="20" y="62" font-size="13" font-weight="bold" fill="#475569">Die Annotation hat zwei Teile:</text>

  <!-- Annotation name breakdown -->
  <rect x="20" y="74" width="820" height="86" fill="white" stroke="#CBD5E1" stroke-width="1.5" rx="8"/>

  <!-- Fixed prefix -->
  <rect x="32" y="86" width="390" height="52" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" rx="6"/>
  <text x="227" y="107" text-anchor="middle" font-family="Courier New, monospace" font-size="13" fill="#1D4ED8">vault.hashicorp.com/agent-inject-secret-</text>
  <text x="227" y="128" text-anchor="middle" font-size="10" fill="#3B82F6" font-weight="bold">fixer Prefix — immer gleich</text>

  <!-- Plus sign -->
  <text x="440" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#94A3B8">+</text>

  <!-- Variable suffix -->
  <rect x="458" y="86" width="168" height="52" fill="#FFF7ED" stroke="#F97316" stroke-width="2" rx="6"/>
  <text x="542" y="107" text-anchor="middle" font-family="Courier New, monospace" font-size="15" font-weight="bold" fill="#C2410C">config</text>
  <text x="542" y="128" text-anchor="middle" font-size="10" fill="#F97316" font-weight="bold">→ wird Dateiname</text>

  <!-- Equals sign -->
  <text x="646" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#94A3B8">=</text>

  <!-- Result annotation name -->
  <rect x="666" y="86" width="162" height="52" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" rx="6"/>
  <text x="747" y="107" text-anchor="middle" font-size="10" fill="#14532D">Annotation-Name:</text>
  <text x="747" y="124" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#15803D">...secret-config</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- SECTION 2: Full example with flow               -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="20" y="184" font-size="13" font-weight="bold" fill="#475569">So funktioniert es:</text>

  <!-- Full YAML annotation -->
  <rect x="20" y="196" width="820" height="60" fill="#1E293B" rx="8"/>
  <text x="36" y="218" font-family="Courier New, monospace" font-size="11" fill="#94A3B8">vault.hashicorp.com/agent-inject-secret-</text>
  <text x="342" y="218" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#FB923C">config</text>
  <text x="388" y="218" font-family="Courier New, monospace" font-size="11" fill="#94A3B8">:</text>
  <text x="36" y="242" font-family="Courier New, monospace" font-size="11" fill="#94A3B8">  value:</text>
  <text x="84" y="242" font-family="Courier New, monospace" font-size="12" font-weight="bold" fill="#34D399">"secret/data/jochen/config"</text>
  <text x="330" y="242" font-family="Courier New, monospace" font-size="11" fill="#64748B">   ← Vault KV Pfad</text>

  <!-- Two arrows down -->
  <!-- Arrow 1: from "config" in name → file -->
  <line x1="355" y1="256" x2="200" y2="320" stroke="#F97316" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="196,320 208,314 205,326" fill="#F97316"/>

  <!-- Arrow 2: from value → vault content -->
  <line x1="540" y1="256" x2="640" y2="320" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="644,320 633,315 636,327" fill="#16A34A"/>

  <!-- Left result box: file in pod -->
  <rect x="40" y="322" width="320" height="110" fill="#FFF7ED" stroke="#F97316" stroke-width="2" rx="8"/>
  <rect x="40" y="322" width="320" height="30" fill="#F97316" rx="8"/>
  <rect x="40" y="340" width="320" height="12" fill="#F97316"/>
  <text x="200" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Datei im Pod</text>
  <text x="56" y="372" font-family="Courier New, monospace" font-size="12" fill="#374151">/vault/secrets/</text>
  <text x="192" y="372" font-family="Courier New, monospace" font-size="14" font-weight="bold" fill="#C2410C">config</text>
  <text x="56" y="395" font-family="Courier New, monospace" font-size="10" fill="#6B7280">← Dateiname kommt vom</text>
  <text x="56" y="411" font-family="Courier New, monospace" font-size="10" fill="#6B7280">   Annotation-Suffix "config"</text>

  <!-- Right result box: vault content -->
  <rect x="500" y="322" width="340" height="110" fill="#F0FDF4" stroke="#16A34A" stroke-width="2" rx="8"/>
  <rect x="500" y="322" width="340" height="30" fill="#16A34A" rx="8"/>
  <rect x="500" y="340" width="340" height="12" fill="#16A34A"/>
  <text x="670" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Inhalt aus Vault</text>
  <text x="516" y="370" font-family="Courier New, monospace" font-size="10" fill="#374151">Pfad: secret/data/jochen/config</text>
  <text x="516" y="390" font-family="Courier New, monospace" font-size="11" fill="#15803D">username=dbuser</text>
  <text x="516" y="408" font-family="Courier New, monospace" font-size="11" fill="#15803D">password=supersecret123</text>

  <!-- Arrow joining both boxes -->
  <line x1="360" y1="377" x2="498" y2="377" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="429" y="371" text-anchor="middle" font-size="10" fill="#64748B">füllt</text>
  <polygon points="498,377 488,372 488,382" fill="#94A3B8"/>

  <!-- ════════════════════════════════════════════════ -->
  <!-- SECTION 3: Second example — different name       -->
  <!-- ════════════════════════════════════════════════ -->

  <text x="20" y="460" font-size="12" font-weight="bold" fill="#475569">Zweites Secret? Einfach andere Annotation anlegen:</text>

  <rect x="20" y="472" width="820" height="20" fill="#1E293B" rx="4"/>
  <text x="36" y="486" font-family="Courier New, monospace" font-size="11" fill="#94A3B8">vault.hashicorp.com/agent-inject-secret-</text>
  <text x="342" y="486" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#FB923C">database</text>
  <text x="418" y="486" font-family="Courier New, monospace" font-size="11" fill="#94A3B8">: "secret/data/jochen/db"</text>
  <text x="648" y="486" font-size="10" fill="#64748B" font-style="italic">→ /vault/secrets/database</text>
</svg>
