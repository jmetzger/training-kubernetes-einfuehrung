name: Build and Push Demo App

on:
  push:
    paths:
      - 'prometheus-grafana/demo-app/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dockertrainereu
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: prometheus-grafana/demo-app
          push: true
          tags: dockertrainereu/k8s-prometheus-demo:latest
